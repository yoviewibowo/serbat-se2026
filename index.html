<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SERBAT SE2026 Mobile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#F57C00;
  --primary-dark:#E65100;
  --secondary:#FFB74D;
  --bg:#F4F7FB;
  --card:#FFFFFF;
  --text:#1E293B;
  --muted:#64748B;
  --border:#E2E8F0;
  --success:#22C55E;
  --danger:#EF4444;
  --warning:#FACC15;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
  --radius:26px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* =========================
LOADING
========================= */

#loadingScreen{
  position:fixed;
  inset:0;
  background:
  linear-gradient(
    135deg,
    #FFA726,
    #FB8C00,
    #EF6C00
  );

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  color:white;

  z-index:99999;

  transition:0.5s;
}

.loading-logo{
  font-size:64px;
  font-weight:800;
  letter-spacing:3px;
}

.loading-sub{
  margin-top:10px;
  text-align:center;
  line-height:1.7;
  font-size:14px;
}

.loading-bar-wrap{
  width:220px;
  height:10px;
  background:rgba(255,255,255,0.2);
  border-radius:999px;
  margin-top:28px;
  overflow:hidden;
}

.loading-bar{
  width:0%;
  height:100%;
  background:white;
  border-radius:999px;
  transition:0.3s;
}

.loading-footer{
  position:absolute;
  bottom:28px;
  font-size:13px;
  opacity:0.9;
}

/* =========================
LOGIN
========================= */

.login-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;

  background:
  linear-gradient(
    135deg,
    #FFA726,
    #FB8C00,
    #EF6C00
  );
}

.login-card{
  width:100%;
  max-width:420px;

  background:rgba(255,255,255,0.95);

  border-radius:34px;

  padding:36px;

  box-shadow:0 20px 50px rgba(0,0,0,0.18);
}

.brand{
  text-align:center;
  margin-bottom:30px;
}

.brand h1{
  font-size:54px;
  color:var(--primary-dark);
  font-weight:800;
}

.brand p{
  margin-top:10px;
  color:#666;
  font-size:14px;
  line-height:1.7;
}

.form-group{
  margin-bottom:18px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
  font-weight:600;
}

.form-group input,
.form-group select,
.form-group textarea{

  width:100%;

  border:1px solid var(--border);

  border-radius:18px;

  padding:14px 16px;

  outline:none;

  font-size:14px;

}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{

  border-color:var(--primary);

  box-shadow:
  0 0 0 4px rgba(245,124,0,0.15);

}

.btn{

  border:none;

  cursor:pointer;

  border-radius:18px;

  padding:15px 18px;

  font-size:14px;

  font-weight:700;

  transition:0.2s;

}

.btn-primary{
  background:var(--primary);
  color:white;
  width:100%;
}

.btn-primary:hover{
  background:var(--primary-dark);
}

/* =========================
APP
========================= */

.app{
  display:none;
  padding:18px;
}

.topbar{

  background:
  linear-gradient(
    135deg,
    #FFA726,
    #FB8C00
  );

  border-radius:28px;

  padding:24px;

  color:white;

  box-shadow:var(--shadow);

  margin-bottom:18px;
}

.topbar h1{
  font-size:34px;
  font-weight:800;
}

.topbar p{
  margin-top:10px;
  line-height:1.7;
  font-size:14px;
  opacity:0.95;
}

.card{

  background:var(--card);

  border-radius:28px;

  padding:22px;

  margin-bottom:18px;

  box-shadow:var(--shadow);

}

.section-title{

  font-size:18px;

  font-weight:700;

  color:var(--primary-dark);

  margin-bottom:18px;

}

.info-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:14px;

}

.info-box{

  background:#FFF7ED;

  border:1px solid #FED7AA;

  border-radius:20px;

  padding:16px;

}

.info-box small{

  display:block;

  font-size:12px;

  color:#9A3412;

  margin-bottom:6px;

}

.info-box strong{

  font-size:15px;

  color:#7C2D12;

}

.status-pill{

  display:inline-flex;

  align-items:center;

  justify-content:center;

  padding:10px 16px;

  border-radius:999px;

  font-size:13px;

  font-weight:700;

}

.valid{
  background:#DCFCE7;
  color:#166534;
}

.warning{
  background:#FEF9C3;
  color:#854D0E;
}

.invalid{
  background:#FEE2E2;
  color:#991B1B;
}

.presence-grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;

  margin-top:20px;

}

.btn-start{
  background:var(--success);
  color:white;
}

.btn-end{
  background:var(--danger);
  color:white;
}

.footer{

  text-align:center;

  margin-top:20px;

  color:#64748B;

  font-size:13px;

  padding-bottom:20px;

}

.hidden{
  display:none !important;
}

@media(max-width:480px){

  .presence-grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>
<body>

<!-- =========================
LOADING
========================= -->

<div id="loadingScreen">

  <div class="loading-logo">
    SERBAT
  </div>

  <div class="loading-sub">
    Sistem Evaluasi Real-time<br>
    Berbasis Aktivitas Lapangan
  </div>

  <div class="loading-bar-wrap">
    <div
      class="loading-bar"
      id="loadingBar"
    ></div>
  </div>

  <div class="loading-footer">
    SERBAT SE2026 by yovie.wibowo
  </div>

</div>

<!-- =========================
LOGIN
========================= -->

<div
  class="login-page"
  id="loginPage"
>

  <div class="login-card">

    <div class="brand">

      <h1>SERBAT</h1>

      <p>
        Sistem Evaluasi Real-time<br>
        Berbasis Aktivitas Lapangan
      </p>

    </div>

    <div class="form-group">

      <label>ID Petugas</label>

      <input
        type="text"
        id="pplId"
        placeholder="Contoh: PPL001"
      >

    </div>

    <div class="form-group">

      <label>Password</label>

      <input
        type="password"
        id="password"
      >

    </div>

    <button
      class="btn btn-primary"
      onclick="login()"
    >

      Login SERBAT

    </button>

  </div>

</div>

<!-- =========================
APP
========================= -->

<div
  class="app"
  id="app"
>

  <!-- TOPBAR -->

  <div class="topbar">

    <h1>SERBAT</h1>

    <p id="welcomeText">
      Selamat datang
    </p>

  </div>

  <!-- GPS -->

  <div class="card">

    <div class="section-title">
      Status GPS
    </div>

    <div class="info-grid">

      <div class="info-box">

        <small>Latitude</small>

        <strong id="latText">
          -
        </strong>

      </div>

      <div class="info-box">

        <small>Longitude</small>

        <strong id="lngText">
          -
        </strong>

      </div>

      <div class="info-box">

        <small>Akurasi</small>

        <strong id="accuracyText">
          -
        </strong>

      </div>

      <div class="info-box">

        <small>IDSUBSLS</small>

        <strong id="idsubslsText">
          -
        </strong>

      </div>

    </div>

    <div style="margin-top:18px;">

      <div id="validationBadge"></div>

    </div>

    <div style="margin-top:18px;">

      <button
        class="btn btn-primary"
        onclick="refreshLocation()"
      >

        Refresh GPS

      </button>

    </div>

  </div>

  <!-- AKTIVITAS -->

  <div class="card">

    <div class="section-title">
      Aktivitas Lapangan
    </div>

    <div class="form-group">

      <label>Jenis Aktivitas</label>

      <select id="activityType">

        <option value="PK">
          Pemutakhiran Keluarga
        </option>

        <option value="PU">
          Pemutakhiran Usaha
        </option>

        <option value="DK">
          Pendataan Keluarga
        </option>

        <option value="DU">
          Pendataan Usaha
        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Jumlah Keluarga</label>

      <input
        type="number"
        id="keluargaDone"
      >

    </div>

    <div class="form-group">

      <label>Jumlah Usaha</label>

      <input
        type="number"
        id="usahaDone"
      >

    </div>

    <div
      class="form-group hidden"
      id="invalidReasonWrapper"
    >

      <label>Alasan Invalid</label>

      <select id="invalidReason">

        <option value="">
          Pilih alasan
        </option>

        <option value="SNL">
          Sinyal GPS Lemah
        </option>

        <option value="KRT">
          Koordinasi RT
        </option>

        <option value="AMS">
          Akses Sulit
        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Catatan</label>

      <textarea id="notes"></textarea>

    </div>

    <div class="presence-grid">

      <button
        class="btn btn-start"
        onclick="submitPresence('MULAI')"
      >

        Presensi Mulai

      </button>

      <button
        class="btn btn-end"
        onclick="submitPresence('SELESAI')"
      >

        Presensi Selesai

      </button>

    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    SERBAT SE2026 by yovie.wibowo

  </div>

</div>

<script>

/* =========================
CONFIG
========================= */

const APPS_SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbz_X6U4krnGxFAc0PzZGdfE1Z9ablltBh3DHgq4r7UAtpCqMi6Zj7O2KOJv8F4760JI/exec';

/* =========================
GLOBAL
========================= */

let currentLat = null;
let currentLng = null;
let currentAccuracy = null;

let validationStatus = 'UNKNOWN';

let detectedIDSUBSLS = '-';

/* =========================
LOADING
========================= */

const loadingBar =
document.getElementById(
  'loadingBar'
);

let loadingProgress = 0;

const loadingInterval =
setInterval(()=>{

  loadingProgress +=
  Math.random()*20;

  if(loadingProgress > 90){

    loadingProgress = 90;

  }

  loadingBar.style.width =
  loadingProgress + '%';

},300);

window.addEventListener('load',()=>{

  setTimeout(()=>{

    clearInterval(
      loadingInterval
    );

    loadingBar.style.width =
    '100%';

    setTimeout(()=>{

      document
      .getElementById(
        'loadingScreen'
      )
      .style.opacity = '0';

      setTimeout(()=>{

        document
        .getElementById(
          'loadingScreen'
        )
        .remove();

      },500);

    },500);

  },1500);

});

/* =========================
LOGIN
========================= */

async function login(){

  const pplId =
    document.getElementById(
      'pplId'
    ).value;

  const password =
    document.getElementById(
      'password'
    ).value;

  if(!pplId || !password){

    alert('Lengkapi login');
    return;

  }

  try{

    const response =
      await fetch(

        `${APPS_SCRIPT_URL}?action=login&ppl_id=${encodeURIComponent(pplId)}&password=${encodeURIComponent(password)}`,

        {
          method:'GET',
          mode:'cors'
        }

      );

    const result =
      await response.json();

    console.log(result);

    if(result.status){

      localStorage.setItem(

        'serbat_user',

        JSON.stringify(
          result.data
        )

      );

      showApp();

    }

    else{

      alert(
        result.message ||
        'Login gagal'
      );

    }

  }

  catch(err){

    console.error(err);

    alert(
      'Koneksi server gagal'
    );

  }

}

function showApp(){

  document
  .getElementById(
    'loginPage'
  )
  .style.display = 'none';

  document
  .getElementById(
    'app'
  )
  .style.display = 'block';

  const user =
    JSON.parse(

      localStorage.getItem(
        'serbat_user'
      )

    );

  document
  .getElementById(
    'welcomeText'
  )
  .innerHTML = `

    ${user.nama}<br>
    ${user.role}

  `;

  getLocation();

}

function logout(){

  localStorage.removeItem(
    'serbat_user'
  );

  location.reload();

}

/* =========================
GPS
========================= */

function refreshLocation(){

  getLocation();

}

function getLocation(){

  navigator.geolocation
  .getCurrentPosition(

    successLocation,

    errorLocation,

    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:0
    }

  );

}

function successLocation(position){

  currentLat =
    position.coords.latitude;

  currentLng =
    position.coords.longitude;

  currentAccuracy =
    position.coords.accuracy;

  document
  .getElementById(
    'latText'
  )
  .innerText =
    currentLat.toFixed(6);

  document
  .getElementById(
    'lngText'
  )
  .innerText =
    currentLng.toFixed(6);

  document
  .getElementById(
    'accuracyText'
  )
  .innerText =
    Math.round(
      currentAccuracy
    ) + 'm';

  // sementara dummy
  detectedIDSUBSLS =
    '6171010001';

  document
  .getElementById(
    'idsubslsText'
  )
  .innerText =
    detectedIDSUBSLS;

  validateGPS();

}

function errorLocation(error){

  console.error(error);

  alert(
    'GPS gagal diakses'
  );

}

/* =========================
VALIDASI
========================= */

function validateGPS(){

  if(currentAccuracy <= 30){

    validationStatus = 'VALID';

  }

  else if(currentAccuracy <= 50){

    validationStatus = 'WARNING';

  }

  else{

    validationStatus = 'INVALID';

  }

  renderValidation();

}

function renderValidation(){

  const badge =
    document.getElementById(
      'validationBadge'
    );

  badge.innerHTML = '';

  const pill =
    document.createElement('div');

  pill.classList.add(
    'status-pill'
  );

  if(validationStatus === 'VALID'){

    pill.classList.add(
      'valid'
    );

    pill.innerHTML =
      'VALID GPS';

    document
    .getElementById(
      'invalidReasonWrapper'
    )
    .classList.add(
      'hidden'
    );

  }

  else if(
    validationStatus === 'WARNING'
  ){

    pill.classList.add(
      'warning'
    );

    pill.innerHTML =
      'WARNING GPS';

    document
    .getElementById(
      'invalidReasonWrapper'
    )
    .classList.add(
      'hidden'
    );

  }

  else{

    pill.classList.add(
      'invalid'
    );

    pill.innerHTML =
      'INVALID GPS';

    document
    .getElementById(
      'invalidReasonWrapper'
    )
    .classList.remove(
      'hidden'
    );

  }

  badge.appendChild(pill);

}

/* =========================
SUBMIT
========================= */

async function submitPresence(type){

  if(!currentLat || !currentLng){

    alert('GPS belum tersedia');

    return;

  }

  const user =
    JSON.parse(

      localStorage.getItem(
        'serbat_user'
      )

    );

  const payload = {

    action:'submit_presence',

    ppl_id:user.ppl_id,
    nama:user.nama,
    role:user.role,

    jenis_presensi:type,

    activity_id:
    document.getElementById(
      'activityType'
    ).value,

    latitude:currentLat,
    longitude:currentLng,

    gps_accuracy:currentAccuracy,

    validation_status:
    validationStatus,

    idsubsls_detected:
    detectedIDSUBSLS,

    idsubsls_expected:
    detectedIDSUBSLS,

    distance_meter:0,

    invalid_reason:
    document.getElementById(
      'invalidReason'
    ).value,

    keluarga_done:
    document.getElementById(
      'keluargaDone'
    ).value || 0,

    usaha_done:
    document.getElementById(
      'usahaDone'
    ).value || 0,

    notes:
    document.getElementById(
      'notes'
    ).value,

    user_agent:
    navigator.userAgent,

    device_info:
    navigator.platform

  };

  try{

    const query =
      new URLSearchParams(
        payload
      );

    const response =
      await fetch(

        APPS_SCRIPT_URL +
        '?' +
        query.toString(),

        {
          method:'GET',
          mode:'cors'
        }

      );

    const result =
      await response.json();

    console.log(result);

    if(result.status){

      alert(
        `Presensi ${type} berhasil`
      );

      document
      .getElementById(
        'keluargaDone'
      )
      .value = '';

      document
      .getElementById(
        'usahaDone'
      )
      .value = '';

      document
      .getElementById(
        'notes'
      )
      .value = '';

    }

    else{

      alert(
        result.message ||
        'Submit gagal'
      );

    }

  }

  catch(err){

    console.error(err);

    alert(
      'Gagal submit presensi'
    );

  }

}

/* =========================
AUTO LOGIN
========================= */

window.onload = ()=>{

  const user =
    localStorage.getItem(
      'serbat_user'
    );

  if(user){

    showApp();

  }

};

</script>
</body>
</html>
